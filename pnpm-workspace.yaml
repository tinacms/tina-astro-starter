# Not a monorepo — `packages` is only here so pnpm <10.5.0 accepts this
# settings file instead of failing with "packages field missing or empty".
packages:
  - '.'

onlyBuiltDependencies:
  - better-sqlite3
  - core-js
  - esbuild
  - protobufjs
  - sharp
allowBuilds:
  better-sqlite3: true
  core-js: true
  esbuild: true
  protobufjs: true
  sharp: true
